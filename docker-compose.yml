name: schul-dashboard-dev

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - ./server:/app
    command: npm run dev
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
    restart: unless-stopped

  app:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    volumes:
      - ./app:/app
    command: npm run dev
    env_file:
      - ./app/.env
    environment:
      API_PROXY_TARGET: http://server:3000
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: unless-stopped

  homepage:
    build:
      context: ./homepage
      dockerfile: Dockerfile.dev
    volumes:
      - ./homepage:/app
    command: npm run dev
    env_file:
      - ./homepage/.env
    environment:
      API_PROXY_TARGET: http://server:3000
    ports:
      - "3001:3001"
    depends_on:
      - server
    restart: unless-stopped