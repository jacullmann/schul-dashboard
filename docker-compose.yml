name: schul-dashboard-dev

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
    restart: unless-stopped

  app:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules
    env_file:
      - ./app/.env
    environment:
      API_PROXY_TARGET: http://server:3000
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: unless-stopped

  homepage:
    build:
      context: ./homepage
      dockerfile: Dockerfile.dev
    volumes:
      - ./homepage:/app
      - homepage_node_modules:/app/node_modules
    env_file:
      - ./homepage/.env
    environment:
      API_PROXY_TARGET: http://server:3000
    ports:
      - "3001:3000"
    depends_on:
      - server
    restart: unless-stopped

  login:
    build:
      context: ./login
      dockerfile: Dockerfile.dev
    volumes:
      - ./login:/app
      - login_node_modules:/app/node_modules
    env_file:
      - ./login/.env
    environment:
      VITE_HW_API_BASE: http://server:3000
    ports:
      - "5174:5173"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  server_node_modules:
  app_node_modules:
  homepage_node_modules:
  login_node_modules:
