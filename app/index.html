<!doctype html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="robots" content="noindex, nofollow" />
    
    <title>schul-dashboard</title>
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=1" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="preconnect" href="https://api.fontshare.com" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />

    <style>
        body {
            background: oklch(0.1684 0 0);
        }

        #initial-loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            background: oklch(0.1684 0 0);
            z-index: 99999;
            opacity: 1;
        }

        #initial-loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .initial-loading-spinner {
            width: 36px;
            height: 36px;
            animation: initial-loading-spinner-rotate 2.2s linear infinite;
            transform-origin: center center;
        }

        .initial-loading-spinner circle {
            fill: none;
            stroke: oklch(1 0 0);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-miterlimit: 10;
            stroke-dasharray: 1, 200;
            stroke-dashoffset: 0;
            animation: initial-loading-spinner-element 1.6s ease-in-out infinite;
        }

        .initial-loading-label {
            font-family: 'Satoshi', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.18em;
            color: oklch(0.8452 0 0);
            text-transform: lowercase;
        }

        @keyframes initial-loading-spinner-rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes initial-loading-spinner-element {
            0% {
                stroke-dasharray: 1, 200;
                stroke-dashoffset: 0;
            }
            50% {
                stroke-dasharray: 89, 200;
                stroke-dashoffset: -35px;
            }
            100% {
                stroke-dasharray: 89, 200;
                stroke-dashoffset: -124px;
            }
        }
    </style>
</head>
<body>
<div id="initial-loading-screen">
    <svg class="initial-loading-spinner" viewBox="25 25 50 50">
        <circle cx="50" cy="50" r="20"/>
    </svg>
    <div class="initial-loading-label">schul-dashboard</div>
</div>

<div id="app"></div>
<script type="module" src="/src/main.ts"></script>
<script>
    window.__removeInitialLoadingScreen = function() {
        const loader = document.getElementById('initial-loading-screen');
        if (loader) {
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 500);
        }
    };
</script>
</body>
</html>
