<!doctype html>
<html lang="en">
  <head>
      <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">

      <meta charset="UTF-8" />
      <link rel="icon" type="image/png" href="/23.svg?v=8" />
      <meta name="robots" content="noindex, nofollow, noarchive">
      <script defer src="https://cloud.umami.is/script.js" data-website-id="9e0ccaf1-08bb-4ab5-b42a-5f7a893090a6"></script>
      <script>
          /* Umami extended pageview properties — robust: wartet auf window.umami und exportiert eine globale Funktion für SPA-Hooks */
          (function () {
              async function collectAndSend() {
                  if (!window.umami || typeof window.umami.track !== 'function') {
                      // falls umami noch nicht da ist, warte kurz (retry)
                      for (let i = 0; i < 10; i++) {
                          await new Promise(r => setTimeout(r, 200));
                          if (window.umami && typeof window.umami.track === 'function') break;
                      }
                      if (!window.umami || typeof window.umami.track !== 'function') {
                          console.warn('Umami nicht gefunden: detailed pageview skipped');
                          return;
                      }
                  }

                  function getLanguage() {
                      return (navigator.language || navigator.userLanguage || null);
                  }

                  function parseUA(ua) {
                      const lower = (ua || '').toLowerCase();
                      let browser = 'unknown';
                      if (lower.includes('firefox')) browser = 'Firefox';
                      else if (lower.includes('edg/')) browser = 'Edge';
                      else if (lower.includes('opr/') || lower.includes('opera')) browser = 'Opera';
                      else if (lower.includes('chrome') && !lower.includes('edg/')) browser = 'Chrome';
                      else if (lower.includes('safari') && !lower.includes('chrome')) browser = 'Safari';

                      let os = 'unknown';
                      if (lower.includes('windows nt 10')) os = 'Windows 10';
                      else if (lower.includes('windows nt 6.3')) os = 'Windows 8.1';
                      else if (lower.includes('windows nt 6.1')) os = 'Windows 7';
                      else if (lower.includes('mac os x')) os = 'macOS';
                      else if (lower.includes('android')) os = 'Android';
                      else if (lower.includes('iphone') || lower.includes('ipad') || lower.includes('ipod')) os = 'iOS';
                      else if (lower.includes('linux')) os = 'Linux';

                      let device = 'desktop';
                      if (lower.includes('mobile')) device = 'mobile';
                      else if (lower.includes('tablet') || lower.includes('ipad')) device = 'tablet';

                      let browserVersion = '';
                      const bMatch = ua.match(/(firefox|edg|opr|opera|chrome|version|safari)[\/ ]?([\d\.]+)/i);
                      if (bMatch) browserVersion = `${bMatch[1]} ${bMatch[2]}`;

                      return {
                          userAgent: ua || null,
                          browser: browser + (browserVersion ? ` ${browserVersion}` : ''),
                          os,
                          device
                      };
                  }

                  async function getPublicIP() {
                      try {
                          const res = await fetch('https://api.ipify.org?format=json', { cache: 'no-store' });
                          if (!res.ok) return null;
                          const json = await res.json();
                          return json && json.ip ? String(json.ip) : null;
                      } catch (e) {
                          return null;
                      }
                  }

                  function getGeolocation(timeout = 7000) {
                      return new Promise((resolve) => {
                          if (!('geolocation' in navigator)) return resolve(null);
                          let done = false;
                          const timer = setTimeout(() => {
                              if (!done) { done = true; resolve(null); }
                          }, timeout);

                          navigator.geolocation.getCurrentPosition(
                              (pos) => {
                                  if (done) return;
                                  done = true;
                                  clearTimeout(timer);
                                  resolve({
                                      lat: pos.coords.latitude,
                                      lon: pos.coords.longitude,
                                      accuracy: pos.coords.accuracy || null,
                                      timestamp: new Date(pos.timestamp).toISOString()
                                  });
                              },
                              () => {
                                  if (done) return;
                                  done = true;
                                  clearTimeout(timer);
                                  resolve(null);
                              },
                              { enableHighAccuracy: false, maximumAge: 60000, timeout }
                          );
                      });
                  }

                  const ua = navigator.userAgent || null;
                  const parsed = parseUA(ua);
                  const language = getLanguage();
                  const screenSize = (window.screen && window.screen.width && window.screen.height) ? `${window.screen.width}x${window.screen.height}` : null;
                  const pageUrl = location.href;
                  const referrer = document.referrer || null;
                  const title = document.title || null;

                  const [ip, geo] = await Promise.all([getPublicIP(), getGeolocation()]);

                  const props = {
                      ip: ip || null,
                      language: language,
                      browser: parsed.browser || null,
                      os: parsed.os || null,
                      device: parsed.device || null,
                      userAgent: parsed.userAgent || null,
                      screen: screenSize,
                      pageUrl: pageUrl,
                      referrer: referrer,
                      title: title,
                      geo_lat: geo ? Number(geo.lat) : null,
                      geo_lon: geo ? Number(geo.lon) : null,
                      geo_accuracy: geo ? Number(geo.accuracy) : null,
                      geo_timestamp: geo ? geo.timestamp : null
                  };

                  const cleaned = {};
                  for (const k in props) {
                      if (props[k] !== null && props[k] !== undefined && props[k] !== '') cleaned[k] = props[k];
                  }

                  try {
                      window.umami.track('Page view detailed', cleaned);
                  } catch (err) {
                      console.error('Umami track failed', err);
                  }
              } // collectAndSend

              // Exponiere globale Funktion für SPA-Hooks
              window.sendUmamiDetailedPageview = collectAndSend;

              // Initialer Aufruf nachdem DOM fertig ist
              if (document.readyState === 'complete' || document.readyState === 'interactive') {
                  collectAndSend();
              } else {
                  document.addEventListener('DOMContentLoaded', collectAndSend, { once: true });
              }

              // SPA-Hooks: ruft die globale Funktion bei History-Navigation auf
              (function enableSpaHook() {
                  const origPush = history.pushState;
                  history.pushState = function () { origPush.apply(this, arguments); window.sendUmamiDetailedPageview(); };
                  const origReplace = history.replaceState;
                  history.replaceState = function () { origReplace.apply(this, arguments); window.sendUmamiDetailedPageview(); };
                  window.addEventListener('popstate', window.sendUmamiDetailedPageview);
              })();

          })();
      </script>


      <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
