<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">

    <title>Wartung</title>
    <style>
        :root {
            --border: #111;
            --text: #111;
            --subtle: #555;
            --muted: #999;
        }

        /* Hauptcontainer für vertikale Zentrierung und Flexibilität */
        .mainnn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Zentriert den Inhalt vertikal, wenn genug Platz ist */
            width: 100%;
            min-height: 100vh; /* Stellt sicher, dass der Container mindestens die Höhe des Viewports hat */
            text-align: center;
            padding: 1rem; /* Fügt etwas Polsterung an den Rändern hinzu */
            box-sizing: border-box; /* Stellt sicher, dass padding in der Breite enthalten ist */
        }

        .main {
            padding: 2px;
            text-align: center;
            margin-top: 2px;
            width: 100%; /* Erlaubt dem main-Container, die volle Breite einzunehmen */
            max-width: 500px; /* Begrenzt die maximale Breite des Hauptinhalts */
        }

        body {
            margin: 0;
            font-family: 'Roboto Slab', serif;
            background: #fff;
            color: var(--text);
            /* Entfernt die unnötige äußere Flexbox-Struktur, da .mainnn jetzt alles handhabt */
            width: 100%;
            word-break: normal;
        }

        header {
            text-align: center;
            max-width: 600px;
            margin-top: 3rem;
            margin-bottom: 0.2rem;
            width: 100%; /* Stellt sicher, dass der Header die volle verfügbare Breite nutzt */
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0; /* Optimiert den Abstand */
        }

        p {
            font-size: 1rem;
            color: var(--subtle);
            line-height: 1.5;
            margin: 0.5rem 0; /* Optimiert den Abstand */
        }

        .card {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem 1.8rem;
            max-width: 450px;
            width: 100%;
            text-align: center;
            margin: 1.2rem auto 0.5rem auto; /* `auto` zentriert die Karte */
            box-sizing: border-box;
        }

        .status {
            font-family: monospace;
            font-size: 1rem;
            margin: 0.6rem 0 0.5rem 0;
        }

        .fine { color: #0a0; }
        .down { color: #a00; }

        button {
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            padding: 0.5em 1.1em;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.15s, color 0.15s;
            width: auto; /* Stellt sicher, dass der Button nicht die volle Breite einnimmt */
        }

        button:hover {
            background: var(--text);
            color: #fff;
        }

        footer {
            text-align: center;
            font-size: 0.83rem;
            color: var(--muted);
            margin-top: auto; /* Drückt den AppFooter nach unten */
            margin-bottom: 1rem;
            line-height: 1.4;
            max-width: 500px;
            width: 100%;
        }

        /* Responsivität: Anpassungen für kleinere Bildschirme (z.B. Mobilgeräte) */
        @media (max-width: 600px) {
            header {
                margin-top: 2rem; /* Reduziert den oberen Rand auf kleinen Bildschirmen */
            }

            h1 {
                font-size: 2rem; /* Macht die Überschrift auf kleinen Bildschirmen kleiner */
            }

            p {
                font-size: 0.9rem; /* Macht den Absatztext auf kleinen Bildschirmen kleiner */
            }

            .card {
                padding: 1rem; /* Reduziert Polsterung der Karte */
                margin-top: 0.8rem;
                max-width: 100%; /* Erlaubt der Karte, die volle Breite zu nutzen (mit 1rem padding vom .mainnn) */
            }

            footer {
                font-size: 0.75rem; /* Macht den AppFooter auf kleinen Bildschirmen kleiner */
            }
        }
    </style>
</head>
<body>
<div class="mainnn">


    <header>
        <h1 class="title">Wartungsarbeiten</h1>
        <p>Wir verbessern gerade die Seite.</p>
        <p>Deine Daten bleiben weiterhin sicher und geschützt.</p>
    </header>
    <div class="main">
        <p style="margin-bottom: 2px">Status:</p>
        <div class="card">
            <div id="status" class="status">prüfe…</div>
            <div class="status" id="message"></div>
            <div class="status" id="details"></div>
            <div class="status" id="ending"></div>
            <button id="refresh">Jetzt prüfen</button>
            <p style="font-size: 0.75rem; color: var(--muted); margin-top: 1.4rem;">
            </p>
        </div>
    </div>

    <footer>
        Bei Fragen oder Problemen kontaktere und gerne unter dashboard-verifizierung@gmail.com
    </footer>

</div>
<script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://ixseupgiqkfgmsalhlgt.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4c2V1cGdpcWtmZ21zYWxobGd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE1NjIxMDcsImV4cCI6MjA3NzEzODEwN30.x9Sr_SwbKLfwbLWTuoBaHoZDKyxpyqMjJX71hdyd_64";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const statusEl = document.getElementById("status");
    const messageEl = document.getElementById("message");
    const detailsEl = document.getElementById("details");
    const endingEl = document.getElementById("ending");
    const refreshBtn = document.getElementById("refresh");

    async function checkStatus() {
        statusEl.textContent = "prüfe…";
        messageEl.textContent = "";
        detailsEl.textContent = "";
        endingEl.textContent = "";

        try {
            const { data, error } = await supabase
                .from("status")
                .select("online, message, details, ending")
                .limit(1);

            if (error) throw error;

            if (!data || data.length === 0) {
                statusEl.textContent = "Keine Daten in der Tabelle!";
                statusEl.className = "status down";
                return;
            }

            const row = data[0];

            const state = row.online;
            const message = row.message ?? "(kein Text)";
            const details = row.details ?? "(kein Text)";
            const ending = row.ending ?? "(kein Text)";

            messageEl.textContent = message;
            detailsEl.textContent = details;
            endingEl.textContent = ending;

            if (state === true) {
                statusEl.textContent = "Online";
                statusEl.className = "status fine";
                window.location.href = "https://schul-dashboard.com";
            } else if (state === false) {
                statusEl.textContent = "Wartung läuft";
                statusEl.className = "status down";
            } else {
                statusEl.textContent = "Status unbekannt";
                statusEl.className = "status down";
            }

        } catch (err) {
            console.error(err);
            statusEl.textContent = "Fehler beim Laden der Daten";
            statusEl.className = "status down";
        }
    }

    refreshBtn.addEventListener("click", checkStatus);

    checkStatus();
    setInterval(checkStatus, 30000);


</script>
</body>
</html>
