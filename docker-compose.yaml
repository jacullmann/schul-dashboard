name: schul-dashboard-dev

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    command: pnpm run dev
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://0.0.0.0:3000/api/system/serverstatus || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  app:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules
    command: pnpm run dev
    env_file:
      - ./app/.env
    environment:
      API_PROXY_TARGET: http://server:3000
    ports:
      - "5173:5173"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  homepage:
    build:
      context: ./homepage
      dockerfile: Dockerfile.dev
    volumes:
      - ./homepage:/app
      - homepage_node_modules:/app/node_modules
    command: pnpm run dev
    env_file:
      - ./homepage/.env
    environment:
      API_PROXY_TARGET: http://server:3000
    ports:
      - "3001:3001"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  geoip:
    build:
      context: ./geoip-service
      dockerfile: Dockerfile
    volumes:
      - geoip_data:/app/data
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MAXMIND_LICENSE_KEY=${MAXMIND_LICENSE_KEY:-}
      - GEOIP_DATABASE_URL=https://raw.githubusercontent.com/P3TERX/GeoLite.mmdb/download/GeoLite2-City.mmdb
      - GEOIP_DATABASE_PATH=/app/data/GeoLite2-City.mmdb
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://0.0.0.0:8080/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  server_node_modules:
  app_node_modules:
  homepage_node_modules:
  geoip_data: